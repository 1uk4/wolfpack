all:
  vars:
    wolf_user: wolf
    owner_telegram_id: "7357687500"
    mac_syncthing_device_id: "{{ lookup('env', 'MAC_SYNCTHING_DEVICE_ID') }}"

  children:
    wolves:
      hosts:
        wolf-01:
          ansible_host: 100.105.247.31
          ansible_ssh_private_key_file: ~/.ssh/wolfpack
          ansible_ssh_extra_args: "-o IdentityAgent=none"
          wolf_name: scout
          telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN_SCOUT') }}"

    cc_hosts:
      # Hosts that run the Wolfpack command-center bot. A host can be in
      # both cc_hosts and wolves (same droplet hosts both the bot and a
      # wolf). When the pack outgrows one box, move cc_hosts to its own
      # droplet; inventory is the only thing that needs to change.
      hosts:
        wolf-01:
