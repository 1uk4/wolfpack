---
# Builds the wolf's den — private Obsidian-compatible brain at
# /home/wolf/workspace/den/ — plus an empty shared/ receive-point for
# the Mac hub's read-only skill/template/pack library.
#
# Static content lives in files/ (copy as-is).
# Templated content lives in templates/ (Jinja substitution).
#
# shared/ is NOT deployed from this playbook — it's pulled from the Mac
# via Syncthing (receive-only). Editing pack content happens on the Mac.

- name: Create den directory structure
  file:
    path: "/home/{{ wolf_user }}/workspace/den/{{ item }}"
    state: directory
    owner: "{{ wolf_user }}"
    group: "{{ wolf_user }}"
  loop:
    - ""
    - memory
    - memory/daily
    - memory/checkpoints
    - tasks
    - knowledge
    - reports

- name: Create shared receive-point directory
  file:
    path: "/home/{{ wolf_user }}/workspace/shared"
    state: directory
    owner: "{{ wolf_user }}"
    group: "{{ wolf_user }}"

- name: Deploy CLAUDE.md (identity, rules, startup)
  template:
    src: CLAUDE.md.j2
    dest: "/home/{{ wolf_user }}/workspace/den/CLAUDE.md"
    owner: "{{ wolf_user }}"
    group: "{{ wolf_user }}"
    force: false

- name: Deploy config.yml (wolf metadata)
  template:
    src: config.yml.j2
    dest: "/home/{{ wolf_user }}/workspace/den/config.yml"
    owner: "{{ wolf_user }}"
    group: "{{ wolf_user }}"

- name: Deploy static den files (force:false — never overwrite wolf edits)
  copy:
    src: "{{ item.src }}"
    dest: "/home/{{ wolf_user }}/workspace/den/{{ item.dest }}"
    owner: "{{ wolf_user }}"
    group: "{{ wolf_user }}"
    force: false
  loop:
    - { src: "SOUL.md",      dest: "SOUL.md" }
    - { src: "MEMORY.md",    dest: "MEMORY.md" }
    - { src: "HEARTBEAT.md", dest: "HEARTBEAT.md" }
    - { src: "human.md",     dest: "memory/human.md" }
    - { src: "decisions.md", dest: "memory/decisions.md" }
    - { src: "lessons.md",   dest: "memory/lessons.md" }
    - { src: "errors.md",    dest: "memory/errors.md" }
    - { src: "inbox.md",     dest: "tasks/inbox.md" }
    - { src: "active.md",    dest: "tasks/active.md" }
    - { src: "done.md",      dest: "tasks/done.md" }

- name: Deploy .stignore in den and shared (Syncthing reads one per folder)
  copy:
    src: stignore
    dest: "/home/{{ wolf_user }}/workspace/{{ item }}/.stignore"
    owner: "{{ wolf_user }}"
    group: "{{ wolf_user }}"
  loop:
    - den
    - shared

- name: Pre-trust den directory in ~/.claude.json
  # wolf-service runs claude with WorkingDirectory=.../workspace/den.
  # Pre-accepting the folder-trust dialog prevents the first-run tmux hang.
  shell: |
    python3 - <<'PY'
    import json, os
    p = "/home/{{ wolf_user }}/.claude.json"
    if not os.path.exists(p):
        raise SystemExit(0)
    with open(p) as f:
        data = json.load(f)
    projects = data.setdefault("projects", {})
    den = projects.setdefault("/home/{{ wolf_user }}/workspace/den", {})
    den["hasTrustDialogAccepted"] = True
    with open(p, "w") as f:
        json.dump(data, f, indent=2)
    PY
    chown {{ wolf_user }}:{{ wolf_user }} /home/{{ wolf_user }}/.claude.json
  changed_when: false
