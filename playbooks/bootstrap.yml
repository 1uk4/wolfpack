---
- name: Bootstrap a wolf
  hosts: wolves
  become: true

  vars:
    tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"

  pre_tasks:
    - name: Create wolf user
      user:
        name: "{{ wolf_user }}"
        shell: /bin/bash
        groups: sudo
        create_home: true

    - name: Allow wolf user sudo without password
      copy:
        content: "{{ wolf_user }} ALL=(ALL) NOPASSWD:ALL"
        dest: "/etc/sudoers.d/{{ wolf_user }}"
        mode: "0440"

    - name: Authorize SSH key for wolf user
      authorized_key:
        user: "{{ wolf_user }}"
        state: present
        key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/wolfpack.pub') }}"

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install essentials
      apt:
        name:
          - curl
          - git
          - ufw
          - fail2ban
          - unzip
          - tmux
        state: present

    - name: Configure UFW defaults
      ufw:
        direction: incoming
        policy: deny

    - name: Allow SSH
      ufw:
        rule: allow
        port: "22"

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Disable root password login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin prohibit-password"
      notify: restart sshd

  roles:
    - tailscale
    - bun
    - claude-code
    - telegram
    - workspace
    - syncthing
    - wolf-service

  post_tasks:
    - name: Get Tailscale IP for summary
      command: tailscale ip -4
      register: final_ts_ip
      changed_when: false

    - name: Get Syncthing device ID for summary
      command: syncthing --device-id
      become_user: "{{ wolf_user }}"
      register: final_st_id
      changed_when: false

    - name: Check wolf service status
      command: systemctl is-active {{ wolf_name }}
      register: wolf_svc_status
      changed_when: false
      failed_when: false

    - name: Update inventory/hosts.yml to use Tailscale IP
      # Runs on the control machine, rewrites this host's ansible_host
      # to the tailscale IP so future runs go over the tailnet.
      delegate_to: localhost
      become: false
      replace:
        path: "{{ playbook_dir }}/../inventory/hosts.yml"
        regexp: '(^\s*{{ inventory_hostname }}:\s*\n(?:\s+[^\n]*\n)*?\s+ansible_host:\s*)\S+'
        replace: '\g<1>{{ final_ts_ip.stdout }}'

    - name: Update ~/.ssh/config 'wolfpack' alias to Tailscale IP
      # Best-effort: only touches the line under "Host wolfpack" if present.
      delegate_to: localhost
      become: false
      lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config"
        regexp: '^(\s*HostName\s+).*'
        line: '    HostName {{ final_ts_ip.stdout }}'
        insertafter: '^Host wolfpack'
        firstmatch: true
      failed_when: false

    - name: "🐺 BOOTSTRAP COMPLETE — post-run checklist"
      debug:
        msg:
          - "================================================================"
          - "  {{ wolf_name | upper }} is provisioned."
          - "================================================================"
          - ""
          - "  Tailscale IP:      {{ final_ts_ip.stdout }}"
          - "  Syncthing ID:      {{ final_st_id.stdout }}"
          - "  wolf-service:      {{ wolf_svc_status.stdout }}"
          - ""
          - "  AUTO-UPDATED on your Mac:"
          - "    ✓ inventory/hosts.yml  →  ansible_host: {{ final_ts_ip.stdout }}"
          - "    ✓ ~/.ssh/config        →  Host wolfpack HostName {{ final_ts_ip.stdout }}"
          - ""
          - "  MANUAL STEPS REMAINING:"
          - ""
          - "  1. Accept the Syncthing folders on your Mac (one-time per wolf):"
          - "       a. Open http://localhost:8384 on your Mac."
          - "       b. Accept the new device '{{ wolf_name }}' when it appears"
          - "          (device ID: {{ final_st_id.stdout }})"
          - "          IMPORTANT: click 'Edit' on the device after adding and"
          - "          set Addresses to:   tcp://{{ final_ts_ip.stdout }}:22000"
          - "          (dynamic discovery is unreliable over Tailscale)"
          - "       c. Accept folder 'den-{{ wolf_name }}' → path:"
          - "            ~/Code/wolfpack/dens/{{ wolf_name }}"
          - "          type: Send & Receive"
          - "       d. Accept folder 'wolfpack-shared' → path:"
          - "            ~/Code/wolfpack/shared"
          - "          type: Send Only"
          - "     (Already accepted previously? Skip.)"
          - ""
          - "  2. DM the Telegram bot to verify the wolf is alive."
          - "     Owner ID {{ owner_telegram_id }} is pre-allowlisted."
          - "================================================================"

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted
