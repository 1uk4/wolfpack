---
- name: Install Syncthing
  shell: |
    curl -fsSL https://syncthing.net/release-key.gpg | gpg --dearmor -o /usr/share/keyrings/syncthing-archive-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable" > /etc/apt/sources.list.d/syncthing.list
    apt-get update
    apt-get install -y syncthing
  args:
    creates: /usr/bin/syncthing

- name: Enable Syncthing service
  systemd:
    name: "syncthing@{{ wolf_user }}"
    enabled: true
    state: started

- name: Wait for Syncthing config
  wait_for:
    path: "/home/{{ wolf_user }}/.local/state/syncthing/config.xml"
    timeout: 30

- name: Get Syncthing device ID
  command: syncthing --device-id
  become_user: "{{ wolf_user }}"
  register: syncthing_device_id
  changed_when: false

- name: Show Syncthing device ID and pairing step
  debug:
    msg:
      - "🔗 Syncthing Device ID for {{ wolf_name }}:"
      - "    {{ syncthing_device_id.stdout }}"
      - "ACTION: on your laptop's Syncthing, add this device ID to pair."
      - "        Web UI on wolf: http://{{ ansible_host }}:8384 (tunnel via Tailscale)"
